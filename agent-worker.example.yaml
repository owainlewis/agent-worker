# Agent Worker Configuration
# Copy this file and update with your own values:
#   cp agent-worker.example.yaml agent-worker.yaml

# --- Provider (required) ---
# Choose one: linear, jira, plane, or github
provider:
  type: linear

  # Linear-specific fields
  # Your Linear project UUID (required for linear)
  # Find it in Linear: Settings > Projects > click project > copy ID from URL
  project_id: "your-project-uuid-here"

  # How often to poll for new tickets, in seconds (default: 60)
  poll_interval_seconds: 60

  # Map your workflow status names to agent lifecycle stages (required)
  # These must match your provider's status names exactly
  statuses:
    ready: "Todo"            # Status that marks a ticket as ready for the agent
    in_progress: "In Progress" # Status set when the agent picks up a ticket
    code_review: "Code Review"  # Status set after the agent creates a PR
    verification: "Verification" # Status set after the PR is merged (terminal)
    failed: "Canceled"       # Status set when the agent fails a ticket

  # --- Jira Server example ---
  # type: jira
  # base_url: "https://jira.example.com"
  # poll_interval_seconds: 60
  # jql: "project = FOO AND status = 'Todo' AND assignee = currentUser()"
  # statuses:
  #   ready: "Todo"
  #   in_progress: "In Progress"
  #   code_review: "Code Review"
  #   verification: "Verification"
  #   failed: "Canceled"

  # --- Plane example ---
  # type: plane
  # base_url: "https://plane.example.com"
  # workspace_slug: "my-workspace"
  # project_id: "your-project-uuid-here"
  # poll_interval_seconds: 60
  # query: "state_group: backlog"
  # statuses:
  #   ready: "Backlog"
  #   in_progress: "In Progress"
  #   code_review: "Code Review"
  #   verification: "Verification"
  #   failed: "Canceled"

  # --- GitHub Projects v2 example ---
  # type: github
  # owner: "your-github-org"
  # repo: "your-repo"
  # project_number: 5
  # owner_type: "organization"                # "organization" (default) or "user"
  # status_field: "Status"                    # Name of the status field (default: "Status")
  # query: "assignee:bot-user label:agent"    # Optional: filter by assignee/label
  # poll_interval_seconds: 60
  # statuses:
  #   ready: "Todo"
  #   in_progress: "In progress"
  #   code_review: "In review"
  #   verification: "Done"
  #   failed: "Canceled"

# --- SCM (required) ---
# The source control system where PRs are created
# Choose one: github or bitbucket_server
scm:
  type: github
  owner: "your-github-org"
  repo: "your-repo"

  # --- BitBucket Server example ---
  # type: bitbucket_server
  # base_url: "https://bitbucket.example.com"
  # project: "PROJ"
  # repo: "myrepo"

# --- Repository (required) ---
repo:
  # Absolute path to the git repository the agent works in
  path: "/path/to/your/repo"

# --- Hooks (optional) ---
hooks:
  # Shell commands to run BEFORE the agent is invoked
  # If any command fails, the ticket is marked failed and the agent is not invoked
  # Supports variables: {id} (ticket ID), {title} (slugified title), {branch} (branch name)
  pre: []

  # Shell commands to run AFTER the agent completes successfully
  # If any command fails, the ticket is marked failed
  post:
    - "git add -A"
    - "git commit -m '{id}: {raw_title}'"
    - "git push origin {branch}"
    - "gh pr create --title '{id}: {raw_title}' --body 'Fixes {id}. Implemented by Agent Worker.' --base main"

# --- Executor (optional) ---
executor:
  # Agent harness to use: "claude" (default), "codex", "opencode", or "pi"
  type: claude

  # Optional: specify which model the agent should use
  # Examples:
  #   claude: "claude-sonnet-4-20250514", "claude-opus-4-20250514"
  #   codex: "o3", "o4-mini"
  #   opencode: "anthropic/claude-sonnet-4", "openai/gpt-4o"
  #   pi: "claude-sonnet-4", "openai/gpt-4o"
  # model: claude-sonnet-4-20250514

  # Maximum time in seconds for the agent to complete (default: 300)
  timeout_seconds: 300

  # Number of retry attempts on failure, 0-3 (default: 0)
  retries: 0

# --- Feedback (optional) ---
feedback:
  # Comment prefix that triggers the agent to respond (default: "/agent")
  # Use this on PR comments or ticket comments to ask the agent to address feedback
  comment_prefix: "/agent"

  # How often to poll for review comments, in seconds (default: 120)
  poll_interval_seconds: 120

# --- Logging (optional) ---
log:
  # Path to log file (optional — omit for stdout-only logging)
  file: "./agent-worker.log"

# --- Environment Variables ---
# Set these in your shell before running agent-worker:
#
# Linear:           LINEAR_API_KEY=your-linear-api-key
# Jira:              JIRA_USERNAME=your-username JIRA_API_TOKEN=your-token
# Plane:             PLANE_API_KEY=your-plane-api-key
# GitHub Projects:   GITHUB_TOKEN=your-github-token (needs repo + project scopes)
# GitHub SCM:        GITHUB_TOKEN=your-github-token
# BitBucket Server:   BITBUCKET_TOKEN=your-bitbucket-token
